<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panduan Screening Test - Dharmasraya Juara 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800;900&family=Barlow:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
    :root {
        --primary: #3b82f6; --primary-dark: #2563eb;
        --secondary: #e2e8f0; --text: #1e293b; --muted: #64748b;
        --good: #22c55e; --accent: #f59e0b;
        --font-title: 'Manrope', sans-serif;
        --font-body: 'Barlow', sans-serif;
    }

    body {
        margin: 0;
        min-height: 100vh;
        background-color: #2563eb;
        background-image: url('https://roboguru-forum-cdn.ruangguru.com//image/39e64d7d-ac2a-46a3-bcf3-2fc28177226f.png');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        font-family: var(--font-body), sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: auto;
        padding: 40px 0;
        box-sizing: border-box;
    }

    h1, h2, h3, .slide-title { font-family: var(--font-title); }

    .presentation-container {
        width: 80%;
        max-width: none;
        height: auto;
        min-height: 85vh;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(12px);
        border: 4px solid #fff;
        border-radius: 40px;
        box-shadow: 0 30px 60px -15px rgba(0,0,0,0.4), 0 0 0 10px rgba(255,255,255,0.2);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
    }

    .slide {
        flex: 1;
        display: none;
        flex-direction: column;
        padding: 40px 40px 20px;
        animation: fadeIn 0.4s ease-out forwards;
        height: calc(100% - 100px);
    }

    .slide.active {
        display: flex;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px) scale(0.98); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .slide-header {
        text-align: center;
        margin-bottom: 24px;
        flex-shrink: 0;
    }

    .slide-badge {
        display: inline-block;
        background: #fef3c7;
        color: #d97706;
        border: 3px solid #fcd34d;
        border-radius: 20px;
        padding: 8px 24px;
        font-size: 18px;
        font-weight: 900;
        margin-bottom: 16px;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-family: var(--font-title);
    }

    .slide-title {
        font-size: clamp(32px, 5vw, 48px);
        font-weight: 900;
        color: #0f172a;
        margin: 0 0 16px;
        line-height: 1.2;
    }

    .slide-text {
        font-size: clamp(18px, 2.5vw, 24px);
        font-weight: 700;
        color: #334155;
        max-width: 900px;
        margin: 0 auto;
        line-height: 1.6;
        background: #f1f5f9;
        padding: 16px 24px;
        border-radius: 24px;
        border: 2px solid #cbd5e1;
    }

    .slide-content {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        margin-top: 16px;
        border-radius: 24px;
        background: #e2e8f0; /* Keeping outer background */
        border: 4px solid #fff;
        box-shadow: inset 0 4px 12px rgba(0,0,0,0.1);
        position: relative;
        min-height: 400px;
        padding: 40px;
    }

    .laptop-frame {
        position: relative;
        width: 100%;
        max-width: 860px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: auto;
    }

    .laptop-bg {
        width: 100%;
        height: auto;
        display: block;
        position: relative;
        z-index: 2;
        pointer-events: none;
        drop-shadow: 0 30px 40px rgba(0,0,0,0.3);
    }

    .slide-img {
        position: absolute;
        top: 5.2%;
        left: 9.8%;
        width: 80.4%;
        height: 85.6%;
        object-fit: cover;
        z-index: 1;
        border-radius: 6px;
        background: #f8fafc;
    }

    .controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 24px 40px;
        background: #fff;
        border-top: 3px solid var(--secondary);
        flex-shrink: 0;
    }

    .btn {
        background: var(--primary);
        color: #fff;
        border: 3px solid var(--primary);
        border-bottom-width: 6px;
        border-bottom-color: var(--primary-dark);
        border-radius: 20px;
        padding: 16px 32px;
        font-size: 22px;
        font-weight: 900;
        cursor: pointer;
        transition: all 0.15s ease;
        display: flex;
        align-items: center;
        gap: 12px;
        font-family: var(--font-title);
    }

    .btn:active {
        transform: translateY(4px);
        border-bottom-width: 2px;
        margin-top: 4px;
    }

    .btn.secondary {
        background: #fff;
        color: var(--text);
        border-color: #cbd5e1;
        border-bottom-color: #94a3b8;
    }

    .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none !important;
        border-bottom-width: 6px !important;
        margin-top: 0 !important;
    }

    .progress-dots {
        display: flex;
        gap: 10px;
    }

    .dot {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #cbd5e1;
        transition: all 0.3s ease;
        cursor: pointer;
    }

    .dot.active {
        background: var(--primary);
        transform: scale(1.3);
        box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
    }
</style>
</head>
<body>

<div class="presentation-container">
    <div id="slides-wrapper" style="height: 100%; display: flex; flex-direction: column;">
        <!-- Slides will be injected here via JS -->
    </div>

    <div class="controls">
        <button id="btnPrev" class="btn secondary" onclick="changeSlide(-1)">⬅️ Kembali</button>
        <div class="progress-dots" id="dots"></div>
        <button id="btnNext" class="btn" onclick="changeSlide(1)">Lanjut ➡️</button>
    </div>
</div>

<script>
    const slidesData = [
        {
            title: "Panduan Pengerjaan 🌟",
            text: "Selamat datang di panduan Screening Test Dharmasraya Juara. Harap perhatikan setiap langkah berikut dengan saksama.<br><br><span style='background:#fef08a; padding:4px 12px; border-radius:8px; border:2px solid #eab308; color:#854d0e;'>🔗 Akses tautan tes di sini: <strong>bit.ly/pt-coding-dms2</strong></span>",
            image: "https://cdn-web-2.ruangguru.com/landing-pages/assets/2c02f684-41b8-4931-9427-87eddee663ae.png"
        },
        {
            title: "Langkah 1: Memilih Nama Sekolah 🏫",
            text: "Tekan tombol 'Pilih Asal Sekolah', kemudian ketik nama sekolah masing-masing. Jika sudah muncul, tekan pada nama sekolah tersebut.",
            image: "https://cdn-web-2.ruangguru.com/landing-pages/assets/7a357295-7a89-4c0d-8e57-f22c03554505.png"
        },
        {
            title: "Langkah 2: Memilih Kelas 📚",
            text: "Setelah nama sekolah terpilih, silakan pilih tingkatan kelas yang sesuai dengan kelasmu saat ini.",
            image: "https://cdn-web-2.ruangguru.com/landing-pages/assets/95ef6257-0525-436b-bb1f-9c6f0205425f.png"
        },
        {
            title: "Langkah 3: Memilih Nama Siswa 🙋‍♂️",
            text: "Tekan tombol 'Pilih Nama Kamu', lalu cari dan pilih namamu dari daftar yang tersedia.",
            image: "https://cdn-web-2.ruangguru.com/landing-pages/assets/79481b6b-2e69-4bcc-b03f-30e9f2086d4c.png"
        },
        {
            title: "Langkah Alternatif: Nama Tidak Ditemukan 🕵️‍♂️",
            text: "Jika namamu tidak ada di daftar, gulir ke paling bawah dan pilih opsi '-- Nama Saya Tidak Ada --'. Kemudian, ketik nama lengkapmu pada kolom yang muncul (gunakan huruf kapital di awal kata).",
            image: "https://cdn-web-2.ruangguru.com/landing-pages/assets/854368c6-4cde-43d9-b4dc-35bc716ff604.png"
        },
        {
            title: "Langkah Alternatif: Sekolah Tidak Ditemukan 📞",
            text: "Apabila nama sekolahmu sama sekali tidak ditemukan, segera angkat tangan dan laporkan kepada Bapak/Ibu Guru yang bertugas.",
            image: "https://cdn-web-2.ruangguru.com/landing-pages/assets/cbf4231f-3015-41bb-b0b0-e6a34cfdb150.png"
        },
        {
            title: "Pengenalan Misi (Pilar) 🚀",
            text: "Screening Test ini terdiri dari 3 bagian misi: Logika, Literasi Digital, dan Spasial. Setiap misi memiliki batas waktu pengerjaan selama 20 menit.",
            image: "https://cdn-web-2.ruangguru.com/landing-pages/assets/55ed4066-b138-49e8-9a31-3fa738e823fd.png"
        },
        {
            title: "Proses Pengerjaan 🎮",
            text: "Dalam setiap misi, kamu akan diminta untuk menyelesaikan berbagai soal interaktif. Baca instruksi dengan teliti dan jangan terburu-buru saat menjawab.",
            image: "https://cdn-web-2.ruangguru.com/landing-pages/assets/47c9d15c-f6af-4449-9f07-e1929d2240a4.png"
        },
        {
            title: "Batas Waktu Pengerjaan ⏰",
            text: "Jika waktu 20 menit telah habis, sistem akan otomatis menyimpan jawabanmu dan melanjutkan ke misi berikutnya. Kamu juga dapat menekan 'Lanjut' jika sudah selesai lebih cepat.",
            image: "https://cdn-web-2.ruangguru.com/landing-pages/assets/47c9d15c-f6af-4449-9f07-e1929d2240a4.png"
        },
        {
            title: "Perhatian: Tidak Ada Pengulangan 🛑",
            text: "Harap diingat bahwa setiap pilar misi hanya dapat dikerjakan satu kali. Pastikan jawaban sudah tepat sebelum melanjutkan.",
            image: "https://cdn-web-2.ruangguru.com/landing-pages/assets/47c9d15c-f6af-4449-9f07-e1929d2240a4.png"
        },
        {
            title: "Kendala Teknis (Refresh) 💻",
            text: "Jika layar tertutup atau tidak sengaja termuat ulang (refresh), jangan khawatir. Cukup buka kembali tautan tes, dan jawabanmu akan otomatis tersimpan.",
            image: "https://cdn-web-2.ruangguru.com/landing-pages/assets/47c9d15c-f6af-4449-9f07-e1929d2240a4.png"
        },
        {
            title: "Penyelesaian Tes 🎉",
            text: "Setelah seluruh misi selesai, kamu tidak dapat masuk kembali ke dalam tes. Nilai akhir akan dirahasiakan. Selamat mengerjakan dan berikan usaha terbaikmu!",
            image: "https://cdn-web-2.ruangguru.com/landing-pages/assets/c69b8369-5528-49f3-a265-9d5dd33f283b.png"
        }
    ];

    let currentSlide = 0;
    const wrapper = document.getElementById('slides-wrapper');
    const dotsContainer = document.getElementById('dots');

    function init() {
        slidesData.forEach((data, index) => {
            // Create slide
            const slide = document.createElement('div');
            slide.className = 'slide' + (index === 0 ? ' active' : '');
            slide.innerHTML = `
                <div class="slide-header">
                    <div class="slide-badge">Langkah ${index + 1} / ${slidesData.length}</div>
                    <h2 class="slide-title">${data.title}</h2>
                    <div class="slide-text">${data.text}</div>
                </div>
                <div class="slide-content">
                    <div class="laptop-frame">
                        <img class="laptop-bg" src="https://png.pngtree.com/png-clipart/20230222/ourmid/pngtree-macbook-pro-16-png-image_6614408.png" alt="Laptop Frame">
                        <img class="slide-img" src="${data.image}" alt="Screenshot Langkah ${index + 1}">
                    </div>
                </div>
            `;
            wrapper.appendChild(slide);

            // Create dot
            const dot = document.createElement('div');
            dot.className = 'dot' + (index === 0 ? ' active' : '');
            dot.onclick = () => goToSlide(index);
            dotsContainer.appendChild(dot);
        });
        updateControls();
    }

    function changeSlide(direction) {
        goToSlide(currentSlide + direction);
    }

    function goToSlide(index) {
        if (index < 0 || index >= slidesData.length) return;
        
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');
        
        slides[currentSlide].classList.remove('active');
        dots[currentSlide].classList.remove('active');
        
        currentSlide = index;
        
        slides[currentSlide].classList.add('active');
        dots[currentSlide].classList.add('active');
        
        updateControls();
    }

    function updateControls() {
        document.getElementById('btnPrev').disabled = currentSlide === 0;
        
        const btnNext = document.getElementById('btnNext');
        if (currentSlide === slidesData.length - 1) {
            btnNext.innerHTML = 'Siap Mengerjakan! 🚀';
            btnNext.onclick = () => alert('Semoga berhasil, Juara!');
        } else {
            btnNext.innerHTML = 'Lanjut ➡️';
            btnNext.onclick = () => changeSlide(1);
        }
    }

    document.addEventListener('keydown', function(event) {
        if (event.key === 'ArrowRight') {
            if (currentSlide < slidesData.length - 1) {
                changeSlide(1);
            }
        } else if (event.key === 'ArrowLeft') {
            if (currentSlide > 0) {
                changeSlide(-1);
            }
        }
    });

    init();
</script>

</body>
</html>
